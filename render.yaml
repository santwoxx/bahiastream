services:
  - type: web
    name: screen-share-webrtc-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        value: ""
        sync: false
